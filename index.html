<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="32x32" href="EnergiaVerdeLogo.png">
  <title>Energia Verde • Login</title>

  <link rel="stylesheet" href="login.css" />
</head>

<body>
  <main class="login-page">
    <div class="logo-container">
      <img src="EnergiaVerdeLogo.png" alt="Energia Verde Logo" class="logo-img">
      <h1 class="logo-title">Energy Safe</h1>
      <p class="logo-subtitle">Monitoramento Energético via IoT</p>
    </div>

    <section class="card">
      <h2>Entrar</h2>

      <div id="errorBox" class="error"></div>

      <form id="loginForm">
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" type="email" placeholder="email@exemplo.com" />
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input id="password" type="password" placeholder="••••••••" />
        </div>

        <div class="actions">
          <button class="btn-primary" type="submit">
            Acessar
          </button>

          <button class="btn-ghost" type="button" id="btnSobre">
            Entenda mais sobre
          </button>
        </div>
      </form>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
